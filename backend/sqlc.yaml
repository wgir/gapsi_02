version: "2"
sql:
  - schema: "db/migrations/000001_init_schema.up.sql"
    queries: "db/queries/"
    engine: "postgresql"
    gen:
      go:
        package: "database"
        out: "internal/infra/database"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
